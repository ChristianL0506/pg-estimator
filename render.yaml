services:
  - type: web
    name: picou-group-estimator
    runtime: node
    buildCommand: npm install && npm run build && cp estimator-data.json dist/estimator-data.json
    startCommand: NODE_ENV=production node dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
    disk:
      name: pg-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
